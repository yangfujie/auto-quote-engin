server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://101.42.14.127:3306/aqe?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # RabbitMQ 配置（必须在 spring 节点下）
  rabbitmq:
    host: 101.42.14.127
    port: 5672               # 注意：AMQP 端口是 5672，不是 15672
    username: admin
    password: admin
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        concurrency: 8
        max-concurrency: 16
        prefetch: 200
        acknowledge-mode: manual
        default-requeue-rejected: false
        retry:
          enabled: false

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# 其他配置...