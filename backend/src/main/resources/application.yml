server:
  port: 8080
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/aqe?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  redis:
    host: localhost
    port: 6379
    # 若不使用Redis，可注释掉，改用内存缓存
  flyway:
    enabled: true
    locations: classpath:db/migration
logging:
  level:
    com.aqe: debug