server:
  port: 8080
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/aqe?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
#  redis:
#    host: localhost
#    port: 6379
    # 若不使用Redis，可注释掉，改用内存缓存
  flyway:
    enabled: true
    baseline-on-migrate: true   # 添加这一行
    locations: classpath:db/migration
# Swagger配置
swagger:
  enabled: true
  title: Auto Quote Engine API
  description: 自动报价引擎接口文档
  version: 1.0.0
  base-package: com.aqe.controller

logging:
  level:
    com.aqe: debug