server:
  port: 8080
spring:
  datasource:
    url: jdbc:mysql://101.42.14.127:3306/aqe?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    rabbitmq:
      host: 101.42.14.127
      port: 15672
      username: admin
      password: admin
      virtual-host: /
      publisher-confirm-type: correlated   # 开启发送确认
      publisher-returns: true              # 开启返回回调
      listener:
        simple:
          concurrency: 8                   # 最小消费者数量
          max-concurrency: 16              # 最大消费者数量
          prefetch: 200                    # 批量预取
          acknowledge-mode: manual         # 手动确认
          default-requeue-rejected: false  # 拒绝后不重新入队（进入死信）
          retry:
            enabled: false                 # 不使用 Spring 重试，由死信队列处理
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
#  redis:
#    host: localhost
#    port: 6379
    # 若不使用Redis，可注释掉，改用内存缓存
  flyway:
    enabled: true
    baseline-on-migrate: true   # 添加这一行
    locations: classpath:db/migration
# Swagger配置
swagger:
  enabled: true
  title: Auto Quote Engine API
  description: 自动报价引擎接口文档
  version: 1.0.0
  base-package: com.aqe.controller

logging:
  level:
    com.aqe: debug