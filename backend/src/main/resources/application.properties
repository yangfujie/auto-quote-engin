server.port=8080

spring.datasource.url=jdbc:mysql://101.42.14.127:3306/aqe?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.rabbitmq.host=101.42.14.127
spring.rabbitmq.port=5672
spring.rabbitmq.username=auto-quote-engin
spring.rabbitmq.password=auto-quote-engin
spring.rabbitmq.virtual-host=/
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.listener.simple.concurrency=8
